name: Release APK

# Builds a signed Android APK and attaches it to a GitHub Release, so people can
# just download and install it. The in-app updater points at these Releases.
#
# One-time setup (see README): add a repo secret EXPO_TOKEN (a free Expo access
# token). Expo builds the APK in the cloud and manages the signing key, so every
# release is signed consistently and installs over the previous one.
#
# To publish a version: push a tag like v1.0.0  ->  the APK shows up under
# Releases automatically. (Or run this workflow manually to just get an artifact.)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK (cloud)
        run: eas build --platform android --profile preview --non-interactive --wait

      - name: Fetch APK url
        id: apk
        run: |
          URL=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive \
            | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const a=JSON.parse(d);process.stdout.write(a[0].artifacts.applicationArchiveUrl)})")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: curl -L -o meal-distributor.apk "${{ steps.apk.outputs.url }}"

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: meal-distributor.apk

      - name: Upload artifact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: meal-distributor-apk
          path: meal-distributor.apk
