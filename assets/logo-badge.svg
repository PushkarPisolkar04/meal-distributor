<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8A4B"/>
      <stop offset="0.55" stop-color="#FF5A3C"/>
      <stop offset="1" stop-color="#FF3D77"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFE7DC"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#glow)"/>
  <rect x="70" y="70" width="884" height="884" rx="188" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="10"/>

  <!-- crossed spoon & fork -->
